<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0a0a0f" stroke="url(#g)" stroke-width="1" opacity="0.9"/>

  <!-- Network lines -->
  <line x1="5" y1="16" x2="16" y2="7" stroke="url(#g)" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="7" x2="27" y2="16" stroke="url(#g)" stroke-width="1.2" opacity="0.5"/>
  <line x1="27" y1="16" x2="16" y2="25" stroke="url(#g)" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="25" x2="5" y2="16" stroke="url(#g)" stroke-width="1.2" opacity="0.5"/>

  <!-- Nodes -->
  <circle cx="16" cy="7" r="2.5" fill="#34d399" filter="url(#glow)"/>
  <circle cx="5" cy="16" r="2.5" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="27" cy="16" r="2.5" fill="#34d399" filter="url(#glow)"/>
  <circle cx="16" cy="25" r="2.5" fill="#a78bfa" filter="url(#glow)"/>

  <!-- Core -->
  <circle cx="16" cy="16" r="3.5" fill="url(#g2)" opacity="0.95"/>
  <circle cx="16" cy="16" r="1.5" fill="#0a0a0f"/>
  <circle cx="16" cy="16" r="0.8" fill="#34d399" opacity="0.9"/>
</svg>
