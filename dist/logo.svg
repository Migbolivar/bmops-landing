<svg xmlns="http://www.w3.org/2000/svg" width="160" height="40" fill="none" viewBox="0 0 160 40">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Logo mark: interconnected hexagonal network -->
  <g transform="translate(4,4)">
    <!-- Connecting lines - AI network edges -->
    <line x1="4" y1="16" x2="16" y2="6" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
    <line x1="16" y1="6" x2="28" y2="16" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
    <line x1="28" y1="16" x2="16" y2="26" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
    <line x1="16" y1="26" x2="4" y2="16" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
    <line x1="4" y1="16" x2="16" y2="26" stroke="url(#g)" stroke-width="0.8" opacity="0.25"/>
    <line x1="28" y1="16" x2="16" y2="6" stroke="#34d399" stroke-width="0.8" opacity="0.3"/>

    <!-- Outer pulse ring -->
    <circle cx="16" cy="16" r="14" fill="none" stroke="url(#g)" stroke-width="0.5" opacity="0.2"/>
    <circle cx="16" cy="16" r="11" fill="none" stroke="url(#g)" stroke-width="0.3" opacity="0.15"/>

    <!-- Top node - emerald -->
    <circle cx="16" cy="6" r="3" fill="#34d399" filter="url(#glow)" opacity="0.95"/>
    <!-- Left node - purple -->
    <circle cx="4" cy="16" r="3" fill="#a78bfa" filter="url(#glow)" opacity="0.95"/>
    <!-- Right node - emerald -->
    <circle cx="28" cy="16" r="3" fill="#34d399" filter="url(#glow)" opacity="0.95"/>
    <!-- Bottom node - purple -->
    <circle cx="16" cy="26" r="3" fill="#a78bfa" filter="url(#glow)" opacity="0.95"/>

    <!-- Center core -->
    <circle cx="16" cy="16" r="4.5" fill="url(#g2)" opacity="0.9"/>
    <circle cx="16" cy="16" r="2" fill="#050508"/>
    <circle cx="16" cy="16" r="1.2" fill="#34d399" opacity="0.8"/>
  </g>

  <!-- BMOPS text -->
  <text x="46" y="28" font-family="'Geist',system-ui,sans-serif" font-weight="700" font-size="22" letter-spacing="-0.5">
    <tspan fill="url(#g)">BM</tspan><tspan fill="#a1a1aa">OPS</tspan>
  </text>
</svg>
