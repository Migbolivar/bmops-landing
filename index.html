<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DATA · AI · AUTOMATION — Miguel Bolivar</title>
<meta name="description" content="Miguel Bolivar — Data Analyst & AI Automation Specialist">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Geist',system-ui,sans-serif}
canvas{position:fixed;top:0;left:0}
.overlay{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
.title-block{text-align:center;opacity:.9}
.title-block .brand{font-size:clamp(32px,8vw,80px);font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1}
.title-block .brand span{background:linear-gradient(135deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title-block .tagline{font-family:'Geist Mono',monospace;font-size:clamp(11px,1.5vw,14px);letter-spacing:.4em;color:#a78bfa;margin-top:12px;text-transform:uppercase}
.hint{position:fixed;bottom:32px;z-index:10;text-align:center;width:100%;pointer-events:none}
.hint p{font-size:12px;color:#52525b;letter-spacing:.15em;text-transform:uppercase}
.hint .dots{display:flex;gap:6px;justify-content:center;margin-top:8px}
.hint .dots span{width:4px;height:4px;border-radius:50%;background:#a78bfa;animation:dotPulse 2s infinite}
.hint .dots span:nth-child(2){animation-delay:.4s}
.hint .dots span:nth-child(3){animation-delay:.8s}
@keyframes dotPulse{0%,100%{opacity:.2}50%{opacity:1}}
.labels{position:fixed;inset:0;z-index:5;pointer-events:none}
.label{position:absolute;font-family:'Geist Mono',monospace;font-size:10px;color:#a78bfa;opacity:0;transition:opacity .6s;text-transform:uppercase;letter-spacing:.15em;background:rgb(0 0 0/.6);padding:4px 10px;border-radius:12px;border:1px solid rgb(167 139 250/.2)}
.label.visible{opacity:1}
.nav{position:fixed;bottom:100px;z-index:20;display:flex;gap:12px;left:50%;transform:translateX(-50%)}
.nav-btn{pointer-events:all;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgb(255 255 255/.1);background:rgb(255 255 255/.05);color:#e4e4e7;backdrop-filter:blur(20px);transition:all .3s;font-family:'Geist',sans-serif;text-decoration:none}
.nav-btn:hover{background:rgb(255 255 255/.12);border-color:rgb(255 255 255/.2)}
.nav-btn.primary{background:linear-gradient(135deg,#a78bfa,#6366f1);border-color:transparent}
.nav-btn.primary:hover{box-shadow:0 8px 30px rgb(167 139 250/.3)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="overlay">
  <div class="title-block">
    <h1 class="brand"><span>DATA</span> · AI · AUTOMATION</h1>
    <p class="tagline">Miguel Bolivar</p>
  </div>
</div>

<div class="hint">
  <p>Orbita · Haz zoom · Explora</p>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<div class="nav">
  <a href="https://miguelbolivar-portafolio.netlify.app" class="nav-btn">📂 Portafolio CV</a>
  <a href="https://ai.bmops.tech" class="nav-btn primary">💼 Consultoría BMOPS</a>
</div>

<div class="labels" id="labels">
  <div class="label" id="lbl-cpu" style="top:45%;left:25%">🧠 CPU — Intel i9</div>
  <div class="label" id="lbl-gpu" style="top:55%;left:65%">🎮 GPU — RTX 4090</div>
  <div class="label" id="lbl-ram" style="top:35%;left:70%">⚡ RAM — 64GB DDR5</div>
  <div class="label" id="lbl-storage" style="top:65%;left:30%">💾 NVMe — 2TB</div>
  <div class="label" id="lbl-ai" style="top:25%;left:50%">🤖 AI Engine</div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#050510');
scene.fog=new THREE.Fog('#050510',15,50);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.5,80);
camera.position.set(8,4,12);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.08;
controls.target.set(0,1,0);
controls.minDistance=4;controls.maxDistance=20;
controls.maxPolarAngle=Math.PI*.7;
controls.update();

// === LIGHTS ===
const ambient=new THREE.AmbientLight('#1a1a3e',.6);scene.add(ambient);
const key=new THREE.DirectionalLight('#ffffff',2);key.position.set(10,15,8);
key.castShadow=true;key.shadow.mapSize.set(2048,2048);
key.shadow.camera.near=.5;key.shadow.camera.far=50;
key.shadow.camera.left=-15;key.shadow.camera.right=15;
key.shadow.camera.top=15;key.shadow.camera.bottom=-15;
scene.add(key);
const rim=new THREE.PointLight('#a78bfa',8,15);rim.position.set(-5,3,-5);scene.add(rim);
const fill=new THREE.PointLight('#34d399',5,10);fill.position.set(6,0,4);scene.add(fill);

// === FLOOR ===
const floorGeo=new THREE.PlaneGeometry(40,40);
const floorMat=new THREE.MeshStandardMaterial({color:'#0a0a14',roughness:.9,metalness:.1});
const floor=new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;floor.position.y=-3.5;
floor.receiveShadow=true;scene.add(floor);

// Grid lines on floor
const gridHelper=new THREE.PolarGridHelper(15,48,24,64,'#1a1a2e','#1a1a2e');
gridHelper.position.y=-3.49;scene.add(gridHelper);

// === COMPUTER TOWER CASE ===
const caseGroup=new THREE.Group();
const mDark=new THREE.MeshStandardMaterial({color:'#1a1a24',roughness:.3,metalness:.8});
const mGlass=new THREE.MeshPhysicalMaterial({color:'#111118',roughness:.1,metalness:.1,transmission:.4,thickness:.5,ior:1.5});
const mAccent=new THREE.MeshStandardMaterial({color:'#a78bfa',roughness:.2,metalness:.6,emissive:'#a78bfa',emissiveIntensity:.3});

// Case body
const bodyGeo=new THREE.BoxGeometry(3,4.5,5);
const body=new THREE.Mesh(bodyGeo,mDark);
body.position.y=2.25;body.castShadow=true;body.receiveShadow=true;
caseGroup.add(body);

// Front panel (glass)
const frontGeo=new THREE.BoxGeometry(2.8,4.3,.05);
const front=new THREE.Mesh(frontGeo,mGlass);
front.position.set(0,2.25,2.5);caseGroup.add(front);

// Accent strips
for(let y of [.8,2.25,3.7]){
  const stripGeo=new THREE.BoxGeometry(2.9,.04,.08);
  const strip=new THREE.Mesh(stripGeo,mAccent);
  strip.position.set(0,y,2.53);caseGroup.add(strip);
}

// === MOTHERBOARD (inside) ===
const mbGeo=new THREE.BoxGeometry(2.6,.05,4.6);
const mb=new THREE.Mesh(mbGeo,new THREE.MeshStandardMaterial({color:'#0a2a0a',roughness:.5,metalness:.3}));
mb.position.set(0,.3,0);caseGroup.add(mb);

// Circuit traces
const traceMat=new THREE.MeshStandardMaterial({color:'#34d399',roughness:.2,metalness:.6,emissive:'#34d399',emissiveIntensity:.6});
for(let i=0;i<30;i++){
  const len=.5+Math.random()*3;
  const traceGeo=new THREE.BoxGeometry(.02,.005,len);
  const trace=new THREE.Mesh(traceGeo,traceMat);
  trace.position.set((Math.random()-.5)*2.3,.33,(Math.random()-.5)*4.3);
  trace.rotation.z=Math.random()<.5?0:Math.PI/2;
  caseGroup.add(trace);
}

// CPU socket + cooler
const cpuBase=new THREE.Mesh(new THREE.BoxGeometry(.8,.1,.8),new THREE.MeshStandardMaterial({color:'#222',roughness:.3,metalness:.9}));
cpuBase.position.set(0,.4,-.5);caseGroup.add(cpuBase);
const cpuCooler=new THREE.Mesh(new THREE.BoxGeometry(.7,.5,.7),new THREE.MeshStandardMaterial({color:'#333',roughness:.4,metalness:.8}));
cpuCooler.position.set(0,.7,-.5);cpuCooler.castShadow=true;caseGroup.add(cpuCooler);
// CPU fins
for(let i=-3;i<=3;i++){
  const fin=new THREE.Mesh(new THREE.BoxGeometry(.6,.02,.04),new THREE.MeshStandardMaterial({color:'#444',roughness:.3,metalness:.9}));
  fin.position.set(0,.95+i*.06,-.5);caseGroup.add(fin);
}
// CPU glow
const cpuGlow=new THREE.Mesh(new THREE.BoxGeometry(.9,.02,.9),new THREE.MeshBasicMaterial({color:'#a78bfa',transparent:true,opacity:.4}));
cpuGlow.position.set(0,.4,-.5);caseGroup.add(cpuGlow);

// GPU card
const gpuGroup=new THREE.Group();
const gpuBoard=new THREE.Mesh(new THREE.BoxGeometry(.15,.5,2.5),new THREE.MeshStandardMaterial({color:'#0a1a0a',roughness:.4,metalness:.3}));
gpuBoard.position.set(1.1,1.5,.2);gpuGroup.add(gpuBoard);
const gpuShroud=new THREE.Mesh(new THREE.BoxGeometry(.3,.4,2.3),new THREE.MeshStandardMaterial({color:'#1a1a24',roughness:.3,metalness:.7}));
gpuShroud.position.set(1.25,1.7,.2);gpuGroup.add(gpuShroud);
// GPU fans
for(let z of[-.6,0,.6]){
  const fan=new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,.05,16),new THREE.MeshStandardMaterial({color:'#222',roughness:.2,metalness:.9}));
  fan.position.set(1.4,1.7,.2+z);fan.rotation.x=Math.PI/2;gpuGroup.add(fan);
}
// GPU RGB
const gpuRGB=new THREE.Mesh(new THREE.BoxGeometry(.32,.02,2.1),new THREE.MeshBasicMaterial({color:'#34d399',transparent:true,opacity:.5}));
gpuRGB.position.set(1.38,1.85,.2);gpuGroup.add(gpuRGB);
caseGroup.add(gpuGroup);

// RAM sticks
for(let z of[-1.2,-.4,.4,1.2]){
  const ram=new THREE.Mesh(new THREE.BoxGeometry(.08,.9,.15),new THREE.MeshStandardMaterial({color:'#0a0a1a',roughness:.3,metalness:.7}));
  ram.position.set(-1.1,1.6,z);caseGroup.add(ram);
  const ramRGB=new THREE.Mesh(new THREE.BoxGeometry(.06,.02,.13),new THREE.MeshBasicMaterial({color:'#a78bfa',transparent:true,opacity:.6}));
  ramRGB.position.set(-1.05,2.05,z);caseGroup.add(ramRGB);
}

// Storage (SSD)
const ssd=new THREE.Mesh(new THREE.BoxGeometry(.6,.08,.9),new THREE.MeshStandardMaterial({color:'#1a1a28',roughness:.3,metalness:.7}));
ssd.position.set(-.8,.5,1.8);caseGroup.add(ssd);
const ssdLabel=new THREE.Mesh(new THREE.BoxGeometry(.5,.01,.7),new THREE.MeshBasicMaterial({color:'#34d399',transparent:true,opacity:.3}));
ssdLabel.position.set(-.8,.55,1.8);caseGroup.add(ssdLabel);

// === DATA PARTICLES ===
const particlesGeo=new THREE.BufferGeometry();
const pCount=400;
const pPos=new Float32Array(pCount*3);
const pColors=new Float32Array(pCount*3);
const violet=new THREE.Color('#a78bfa'),emerald=new THREE.Color('#34d399');
for(let i=0;i<pCount;i++){
  pPos[i*3]=(Math.random()-.5)*3;
  pPos[i*3+1]=Math.random()*4.5;
  pPos[i*3+2]=(Math.random()-.5)*5;
  const c=violet.clone().lerp(emerald,Math.random());
  pColors[i*3]=c.r;pColors[i*3+1]=c.g;pColors[i*3+2]=c.b;
}
particlesGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
particlesGeo.setAttribute('color',new THREE.BufferAttribute(pColors,3));
const particlesMat=new THREE.PointsMaterial({size:.03,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.8});
const particles=new THREE.Points(particlesGeo,particlesMat);
caseGroup.add(particles);

// === DATA FLOW LINES ===
const flowGroup=new THREE.Group();
for(let i=0;i<8;i++){
  const curve=new THREE.CatmullRomCurve3([
    new THREE.Vector3((Math.random()-.5)*2.5,Math.random()*4,(Math.random()-.5)*4.5),
    new THREE.Vector3((Math.random()-.5)*2.5,Math.random()*4,(Math.random()-.5)*4.5),
  ]);
  const tubeGeo=new THREE.TubeGeometry(curve,20,.01,8,false);
  const tube=new THREE.Mesh(tubeGeo,new THREE.MeshBasicMaterial({color:i<4?'#a78bfa':'#34d399',transparent:true,opacity:.4}));
  flowGroup.add(tube);
}
caseGroup.add(flowGroup);

scene.add(caseGroup);

// === GLOW RING around case ===
const ringGeo2=new THREE.TorusGeometry(3.8,.02,16,120);
const ring2=new THREE.Mesh(ringGeo2,new THREE.MeshBasicMaterial({color:'#a78bfa',transparent:true,opacity:.15}));
ring2.position.y=2.25;ring2.rotation.x=Math.PI/2.5;scene.add(ring2);

// === ANIMATION ===
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  controls.update();
  ring2.rotation.z+=.003;
  ring2.rotation.x+=.002;
  particles.rotation.y+=.002;
  flowGroup.rotation.y+=.001;
  cpuGlow.material.opacity=.3+Math.sin(t*2)*.15;
  gpuRGB.material.opacity=.4+Math.sin(t*3)*.2;
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// Label visibility based on camera position
const labels={cpu:document.getElementById('lbl-cpu'),gpu:document.getElementById('lbl-gpu'),
  ram:document.getElementById('lbl-ram'),storage:document.getElementById('lbl-storage'),ai:document.getElementById('lbl-ai')};

setInterval(()=>{
  const dist=camera.position.distanceTo(controls.target);
  const show=dist<8;
  Object.values(labels).forEach(l=>l.classList.toggle('visible',show));
},500);
</script>
</body>
</html>
