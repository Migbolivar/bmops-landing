<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DATA · AI · AUTOMATION</title>
<meta name="description" content="Miguel Bolivar — Data Analyst & AI Automation Specialist">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030308 url(bg.jpg) center/cover fixed;font-family:'Geist',system-ui,sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:rgb(3 3 8/.55);z-index:0;pointer-events:none}
canvas{position:fixed;top:0;left:0;z-index:1}

.scroll-container{position:relative;z-index:2;height:250vh;pointer-events:none}
.scroll-container .active-area{pointer-events:all}

.hero-text{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .8s}
.hero-text.visible{opacity:1}
.hero-text h1{font-size:clamp(42px,10vw,96px);font-weight:800;letter-spacing:-.03em;color:#fff;line-height:1;text-align:center}
.hero-text h1 span{background:linear-gradient(135deg,#a78bfa 20%,#34d399 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-text .sub{font-family:'Geist Mono',monospace;font-size:clamp(12px,1.8vw,16px);letter-spacing:.5em;color:#a78bfa;margin-top:16px;text-transform:uppercase}
.hero-text .btns{display:flex;gap:20px;margin-top:48px;pointer-events:all;flex-wrap:wrap;justify-content:center}
.hero-text .btns a{position:relative;padding:16px 36px;font-size:15px;font-weight:600;text-decoration:none;color:#e4e4e7;font-family:'Geist',sans-serif;letter-spacing:.05em;text-transform:uppercase;transition:all .4s}
.hero-text .btns a::before{content:'';position:absolute;inset:0;background:rgb(167 139 250/.08);border:1px solid rgb(167 139 250/.3);clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);transition:all .4s}
.hero-text .btns a::after{content:'';position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;background:transparent;border:1px solid rgb(167 139 250/.5);clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);opacity:0;transition:opacity .4s;z-index:-1}
.hero-text .btns a:hover{color:#fff;transform:translateY(-2px)}
.hero-text .btns a:hover::before{background:rgb(167 139 250/.15);border-color:rgb(167 139 250/.6)}
.hero-text .btns a:hover::after{opacity:1;box-shadow:0 0 30px rgb(167 139 250/.3),inset 0 0 30px rgb(167 139 250/.05)}
.hero-text .btns a span.corner{position:absolute;width:16px;height:16px;border-color:rgb(167 139 250/.6)}
.hero-text .btns a span.tl{top:2px;left:2px;border-top:1px solid;border-left:1px solid}
.hero-text .btns a span.br{bottom:2px;right:2px;border-bottom:1px solid;border-right:1px solid}

.hint-scroll{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;transition:opacity .5s;text-align:center}
.hint-scroll p{font-size:11px;color:rgb(255 255 255/.25);letter-spacing:.25em;text-transform:uppercase;margin-bottom:8px}
.hint-scroll .arrow{width:1px;height:40px;background:linear-gradient(180deg,rgb(167 139 250/.6),transparent);margin:0 auto}
.hint-scroll.hidden{opacity:0}

.loader{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#030308;transition:opacity .8s}
.loader.hidden{opacity:0;pointer-events:none}
.loader .ring{width:44px;height:44px;border:2px solid #1a1a2e;border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}
.loader .pct{font-size:48px;font-weight:800;color:#fff;letter-spacing:-.02em}
.loader .pct span{background:linear-gradient(135deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.loader .label{font-size:11px;color:#52525b;letter-spacing:.3em;text-transform:uppercase;margin-top:8px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:500px){.hero-text .btns{flex-direction:column;align-items:center}}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="ring"></div>
  <div class="pct"><span id="pctVal">0</span>%</div>
  <div class="label">Cargando</div>
</div>

<canvas id="c"></canvas>

<div class="scroll-container" id="scrollArea"></div>

<div class="hero-text" id="heroText">
  <h1><span>DATA</span> · AI · AUTOMATION</h1>
  <p class="sub">Miguel Bolivar</p>
  <div class="btns">
    <a href="https://miguelbolivar-portafolio.netlify.app">
      <span class="corner tl"></span>📂 Portafolio CV<span class="corner br"></span>
    </a>
    <a href="https://ai.bmops.tech">
      <span class="corner tl"></span>💼 Consultoría BMOPS<span class="corner br"></span>
    </a>
  </div>
</div>

<div class="hint-scroll" id="hintScroll">
  <p>Scroll para explorar</p>
  <div class="arrow"></div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {DRACOLoader} from 'three/addons/loaders/DRACOLoader.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
renderer.setClearColor(0x000000,0);

const scene=new THREE.Scene();
scene.fog=new THREE.Fog('#030308',4,20);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.5,50);
camera.position.set(4,3,10);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.08;
controls.target.set(0,1.5,0);
controls.minDistance=1.5;controls.maxDistance=15;
controls.maxPolarAngle=Math.PI*.6;
controls.autoRotate=true;controls.autoRotateSpeed=.4;

scene.add(new THREE.AmbientLight('#1a1a3e',.7));
const key=new THREE.DirectionalLight('#ffffff',2.5);key.position.set(8,12,6);scene.add(key);
const rim1=new THREE.PointLight('#a78bfa',5,12);rim1.position.set(-4,3,-3);scene.add(rim1);
const rim2=new THREE.PointLight('#34d399',3,10);rim2.position.set(5,2,4);scene.add(rim2);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(30,30),
  new THREE.MeshStandardMaterial({color:'#060610',roughness:.85,metalness:.2,transparent:true}));
floor.rotation.x=-Math.PI/2;floor.position.y=-3;floor.receiveShadow=true;scene.add(floor);

let pcModel=null;
const loader=new GLTFLoader();
const draco=new DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
loader.setDRACOLoader(draco);

const startTime=Date.now();
const MIN_LOAD=1.2;

loader.load('model.glb',gltf=>{
  const elapsed=(Date.now()-startTime)/1000;
  const remaining=Math.max(0,MIN_LOAD-elapsed)*1000;
  setTimeout(()=>{
    pcModel=gltf.scene;
    const box=new THREE.Box3().setFromObject(pcModel);
    const size=box.getSize(new THREE.Vector3());const center=box.getCenter(new THREE.Vector3());
    const scale=6/Math.max(size.x,size.y,size.z);
    pcModel.scale.setScalar(scale);
    pcModel.position.set(-center.x*scale,-center.y*scale+2.5,-center.z*scale);
    pcModel.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;n.material=Array.isArray(n.material)?n.material.map(m=>m.clone()):n.material.clone();if(!Array.isArray(n.material))n.material.transparent=true}});
    scene.add(pcModel);
    document.getElementById('loader').classList.add('hidden');
  },remaining);
},p=>{
  document.getElementById('pctVal').textContent=Math.round(p.loaded/p.total*100);
});

// === AUDIO ===
const ambient=new Audio('ambient.mp3');
ambient.loop=true;ambient.volume=0;ambient.preload='auto';ambient.load();
let audioStarted=false;
function tryPlay(){
  if(!audioStarted){ambient.play().then(()=>{audioStarted=true;let v=0;const f=setInterval(()=>{v+=.01;if(v>=.4){v=.4;clearInterval(f)}ambient.volume=v},75)}).catch(()=>{})}
}
document.addEventListener('click',tryPlay);
document.addEventListener('touchstart',tryPlay,{once:true});

// === SCROLL ZOOM EFFECT ===
const heroText=document.getElementById('heroText');
const hintScroll=document.getElementById('hintScroll');
const scrollArea=document.getElementById('scrollArea');

window.addEventListener('scroll',()=>{
  const scrolled=window.scrollY;
  const maxScroll=document.body.scrollHeight-window.innerHeight;
  const progress=Math.min(scrolled/maxScroll,1);

  // Camera zoom into computer
  camera.position.z=10-progress*6;
  controls.target.y=1.5+progress*.5;

  // Fade out scene elements
  if(pcModel){
    pcModel.traverse(n=>{
      if(n.isMesh&&n.material&&!Array.isArray(n.material)){
        n.material.opacity=1-progress;
      }
    });
  }
  floor.material.opacity=1-progress;
  scene.fog.density=.02+progress*.08;
  renderer.toneMappingExposure=1.1-progress*.8;

  // Fade out hint scroll
  hintScroll.classList.toggle('hidden',progress>.15);

  // Show hero text at bottom
  heroText.classList.toggle('visible',progress>.7);

  controls.update();
});

function animate(){
  requestAnimationFrame(animate);
  if(!window.scrollY||window.scrollY<10)controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
