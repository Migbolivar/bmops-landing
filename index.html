.nav-btn.accent{background:linear-gradient(135deg,#6366f1,#a78bfa);border-color:transparent;color:#fff}
.nav-btn.accent:hover{box-shadow:0 10px 40px rgb(167 139 250/.4);transform:translateY(-3px)}
