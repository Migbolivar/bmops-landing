<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;color:#e4e4e7;font-family:'Geist',system-ui,-apple-system,sans-serif;overflow-x:hidden;cursor:crosshair}
canvas{position:fixed;top:0;left:0;z-index:0}
.content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center}
.pre-title{font-family:'Geist Mono',monospace;font-size:clamp(11px,1.5vw,13px);letter-spacing:.3em;text-transform:uppercase;color:#a78bfa;margin-bottom:clamp(16px,3vh,28px);opacity:0;animation:fadeUp .8s .2s forwards}
.main-title{font-size:clamp(42px,10vw,96px);font-weight:800;line-height:1;letter-spacing:-.02em;margin-bottom:clamp(12px,2vh,20px);opacity:0;animation:fadeUp .8s .4s forwards}
.main-title .accent{background:linear-gradient(135deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:clamp(15px,2.5vw,20px);color:#71717a;font-weight:300;margin-bottom:clamp(40px,8vh,64px);opacity:0;animation:fadeUp .8s .6s forwards}
.buttons{display:flex;gap:clamp(14px,3vw,24px);flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp .8s .8s forwards}
.btn{position:relative;padding:clamp(14px,2vw,18px) clamp(28px,4vw,48px);border-radius:60px;font-size:clamp(14px,1.8vw,16px);font-weight:600;text-decoration:none;transition:all .4s cubic-bezier(.25,.8,.25,1.2);letter-spacing:.01em;overflow:hidden}
.btn-cv{background:rgb(255 255 255/.08);border:1px solid rgb(255 255 255/.12);color:#e4e4e7;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.btn-cv:hover{background:rgb(255 255 255/.16);border-color:rgb(255 255 255/.25);transform:translateY(-3px);box-shadow:0 12px 40px rgb(167 139 250/.2)}
.btn-consulting{background:linear-gradient(135deg,#a78bfa,#6366f1);border:1px solid transparent;color:#fff}
.btn-consulting:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgb(167 139 250/.35)}
.btn .icon{margin-right:6px}
.scroll-hint{position:absolute;bottom:clamp(24px,4vh,40px);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeUp .8s 1.2s forwards}
.scroll-hint span{font-size:11px;color:#52525b;text-transform:uppercase;letter-spacing:.2em}
.scroll-line{width:1px;height:clamp(32px,5vh,48px);background:linear-gradient(180deg,#a78bfa,transparent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.buttons{flex-direction:column;width:100%;max-width:300px}.btn{text-align:center;width:100%}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="content">
  <p class="pre-title">Data Analyst & AI Automation Specialist</p>
  <h1 class="main-title"><span class="accent">Miguel</span> Bolivar</h1>
  <p class="subtitle">Data · AI · Automatización</p>
  <div class="buttons">
    <a href="https://miguelbolivar-portafolio.netlify.app" class="btn btn-cv"><span class="icon">📂</span> Portafolio CV</a>
    <a href="https://ai.bmops.tech" class="btn btn-consulting"><span class="icon">💼</span> Consultoría BMOPS</a>
  </div>
  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</div>

<script type="importmap">

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,.1,100);
camera.position.z=30;

const mouse=new THREE.Vector2();
const target=new THREE.Vector2();
let scrollY=0;

// === PARTICLE SPHERE ===
const sphereGeo=new THREE.BufferGeometry();
const count=2000;
const positions=new Float32Array(count*3);
const colors=new Float32Array(count*3);
const sizes=new Float32Array(count);

const violet=new THREE.Color('#a78bfa');
const emerald=new THREE.Color('#34d399');
const indigo=new THREE.Color('#6366f1');

for(let i=0;i<count;i++){
  const theta=Math.random()*Math.PI*2;
  const phi=Math.acos(2*Math.random()-1);
  const r=8+Math.random()*4;
  positions[i*3]=r*Math.sin(phi)*Math.cos(theta);
  positions[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
  positions[i*3+2]=r*Math.cos(phi);
  const mix=Math.random();
  const c=violet.clone().lerp(emerald,mix).lerp(indigo,Math.random()*.3);
  colors[i*3]=c.r;colors[i*3+1]=c.g;colors[i*3+2]=c.b;
  sizes[i]=Math.random()*3+1;
}

sphereGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));
sphereGeo.setAttribute('color',new THREE.BufferAttribute(colors,3));
sphereGeo.setAttribute('size',new THREE.BufferAttribute(sizes,1));

const sphereMat=new THREE.PointsMaterial({
  size:.08,vertexColors:true,blending:THREE.AdditiveBlending,
  depthWrite:false,transparent:true,opacity:.8
});
const sphere=new THREE.Points(sphereGeo,sphereMat);
scene.add(sphere);

// === INFINITE GRID ===
const grid=new THREE.GridHelper(60,80,'#1a1a2e','#0f0f1a');
grid.position.y=-12;
scene.add(grid);

// === ORBITING RING ===
const ringGeo=new THREE.TorusGeometry(11,.02,16,200);
const ringMat=new THREE.MeshBasicMaterial({color:'#a78bfa',transparent:true,opacity:.15});
const ring=new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x=Math.PI/3;
scene.add(ring);

const ring2Geo=new THREE.TorusGeometry(13,.015,16,200);
const ring2Mat=new THREE.MeshBasicMaterial({color:'#34d399',transparent:true,opacity:.1});
const ring2=new THREE.Mesh(ring2Geo,ring2Mat);
ring2.rotation.x=-Math.PI/4;
ring2.rotation.y=Math.PI/5;
scene.add(ring2);

// === AMBIENT DOTS ===
const dotsGeo=new THREE.BufferGeometry();
const dotsCount=500;
const dotsPos=new Float32Array(dotsCount*3);
for(let i=0;i<dotsCount;i++){
  dotsPos[i*3]=(Math.random()-.5)*40;
  dotsPos[i*3+1]=(Math.random()-.5)*30;
  dotsPos[i*3+2]=(Math.random()-.5)*20;
}
dotsGeo.setAttribute('position',new THREE.BufferAttribute(dotsPos,3));
const dotsMat=new THREE.PointsMaterial({size:.04,color:'#a78bfa',blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.5});
const dots=new THREE.Points(dotsGeo,dotsMat);
scene.add(dots);

// === LIGHTS ===
scene.add(new THREE.AmbientLight('#a78bfa',.3));

// === MOUSE ===
window.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
});

window.addEventListener('scroll',()=>{scrollY=window.scrollY});

let time=0;
function animate(ts){
  requestAnimationFrame(animate);
  time=ts*.001;
  target.lerp(mouse,.05);

  sphere.rotation.y+=.0008;
  sphere.rotation.x+=.0003;
  sphere.rotation.x+=target.y*.001;
  sphere.rotation.y+=target.x*.001;

  ring.rotation.z+=.001;
  ring2.rotation.z-=.0008;

  dots.rotation.y+=.0003;
  dots.rotation.x+=.0002;

  const dispersion=scrollY*.015;
  sphere.scale.setScalar(1+dispersion);
  sphere.material.opacity=Math.max(0,.8-dispersion*.5);
  grid.position.y=-12-scrollY*.02;
  ring.scale.setScalar(1+dispersion*.8);
  ring2.scale.setScalar(1+dispersion*.6);
  ring.material.opacity=Math.max(0,.15-dispersion*.1);
  ring2.material.opacity=Math.max(0,.1-dispersion*.08);
  dots.material.opacity=Math.max(0,.5-dispersion*.3);
  dots.rotation.y+=dispersion*.002;

  renderer.render(scene,camera);
}
animate(0);

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
