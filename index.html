<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>bmops.tech</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030308;overflow:hidden;height:100vh;width:100vw}
canvas{position:fixed;top:0;left:0}
.loader{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#030308;transition:opacity .8s}
.loader.hidden{opacity:0;pointer-events:none}
.loader .ring{width:44px;height:44px;border:2px solid #1a1a2e;border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}
.loader .pct{font-size:48px;font-weight:800;color:#fff;font-family:system-ui,sans-serif;letter-spacing:-.02em}
.loader .pct span{background:linear-gradient(135deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.loader .label{font-size:11px;color:#52525b;letter-spacing:.3em;text-transform:uppercase;margin-top:8px;font-family:system-ui,sans-serif}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader" id="loader">
  <div class="ring"></div>
  <div class="pct"><span id="pctVal">0</span>%</div>
  <div class="label">Cargando</div>
</div>
<canvas id="c"></canvas>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {DRACOLoader} from 'three/addons/loaders/DRACOLoader.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#030308');
scene.fog=new THREE.Fog('#030308',6,25);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.5,50);
camera.position.set(4,3,8);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.08;
controls.target.set(0,1.5,0);
controls.minDistance=2;controls.maxDistance=12;
controls.maxPolarAngle=Math.PI*.6;
controls.autoRotate=true;controls.autoRotateSpeed=.5;
controls.update();

scene.add(new THREE.AmbientLight('#1a1a3e',.7));
const key=new THREE.DirectionalLight('#ffffff',2.5);key.position.set(8,12,6);scene.add(key);
const rim1=new THREE.PointLight('#a78bfa',5,12);rim1.position.set(-4,3,-3);scene.add(rim1);
const rim2=new THREE.PointLight('#34d399',3,10);rim2.position.set(5,2,4);scene.add(rim2);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(30,30),
  new THREE.MeshStandardMaterial({color:'#060610',roughness:.85,metalness:.2}));
floor.rotation.x=-Math.PI/2;floor.position.y=-3;floor.receiveShadow=true;scene.add(floor);

const loader=new GLTFLoader();
const draco=new DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
loader.setDRACOLoader(draco);

const startTime=Date.now();
const MIN_LOAD=1.2;

loader.load('model.glb',gltf=>{
  const elapsed=(Date.now()-startTime)/1000;
  const remaining=Math.max(0,MIN_LOAD-elapsed)*1000;
  setTimeout(()=>{
    const model=gltf.scene;
  const box=new THREE.Box3().setFromObject(model);
  const size=box.getSize(new THREE.Vector3());
  const center=box.getCenter(new THREE.Vector3());
  const scale=6/Math.max(size.x,size.y,size.z);
  model.scale.setScalar(scale);
  model.position.set(-center.x*scale,-center.y*scale+2.5,-center.z*scale);
  model.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true}});
  scene.add(model);
  document.getElementById('loader').classList.add('hidden');
  },remaining);
},p=>{
  const pct=Math.round(p.loaded/p.total*100);
  document.getElementById('pctVal').textContent=pct;
});

// === AMBIENT AUDIO ===
const ambient=new Audio('ambient.mp3');
ambient.loop=true;ambient.volume=0;ambient.preload='auto';ambient.load();
let audioStarted=false;

function tryPlay(){
  if(!audioStarted){
    ambient.play().then(()=>{
      audioStarted=true;
      let vol=0;const fade=setInterval(()=>{vol+=.01;if(vol>=.4){vol=.4;clearInterval(fade)}ambient.volume=vol},75);
    }).catch(()=>{});
  }
}
document.addEventListener('click',tryPlay);
document.addEventListener('touchstart',tryPlay,{once:true});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
