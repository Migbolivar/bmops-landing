<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DATA · AI · AUTOMATION</title>
<meta name="description" content="Miguel Bolivar — Data Analyst & AI Automation Specialist">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030308;overflow:hidden;font-family:'Geist',system-ui,sans-serif}
canvas{position:fixed;top:0;left:0}
.overlay{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
.title-block{text-align:center;opacity:.95}
.title-block h1{font-size:clamp(32px,8vw,80px);font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1}
.title-block h1 span{background:linear-gradient(135deg,#a78bfa 20%,#34d399 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.title-block .sub{font-family:'Geist Mono',monospace;font-size:clamp(11px,1.5vw,13px);letter-spacing:.4em;color:#a78bfa;margin-top:12px;text-transform:uppercase}
.nav-bar{position:fixed;bottom:36px;z-index:20;display:flex;gap:12px;left:50%;transform:translateX(-50%)}
.nav-btn{pointer-events:all;padding:12px 28px;border-radius:28px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid rgb(255255255/.1);background:rgb(255255255/.06);color:#e4e4e7;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:all .3s;font-family:'Geist',sans-serif;text-decoration:none;white-space:nowrap}
.nav-btn:hover{background:rgb(255255255/.14);border-color:rgb(255255255/.25)}
.nav-btn.accent{background:linear-gradient(135deg,#6366f1,#a78bfa);border-color:transparent}
.nav-btn.accent:hover{box-shadow:0 8px 32px rgb(167139250/.35)}
.hint{position:fixed;bottom:120px;z-index:10;text-align:center;width:100%;pointer-events:none}
.hint p{font-size:11px;color:#52525b;letter-spacing:.2em;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <div class="title-block">
    <h1><span>DATA</span> · AI · AUTOMATION</h1>
    <p class="sub">Miguel Bolivar</p>
  </div>
</div>
<div class="hint"><p>🖱️ Arrastra · 📜 Zoom · 🔍 Explora</p></div>
<div class="nav-bar">
  <a href="https://miguelbolivar-portafolio.netlify.app" class="nav-btn">📂 Portafolio CV</a>
  <a href="https://ai.bmops.tech" class="nav-btn accent">💼 Consultoría BMOPS</a>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#030308');
scene.fog=new THREE.Fog('#030308',12,35);

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.5,60);
camera.position.set(6,3,10);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.06;
controls.target.set(0,2,0);
controls.minDistance=3;controls.maxDistance=18;
controls.maxPolarAngle=Math.PI*.65;controls.minPolarAngle=.2;
controls.update();

// Post-processing
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),.6,.4,.85);
bloom.threshold=.1;bloom.strength=.5;bloom.radius=.4;
composer.addPass(bloom);

// Lighting
const ambient=new THREE.AmbientLight('#1a1a3e',.5);scene.add(ambient);
const key=new THREE.DirectionalLight('#ffffff',2.5);key.position.set(8,12,6);
key.castShadow=true;key.shadow.mapSize.set(2048,2048);
key.shadow.camera.near=.5;key.shadow.camera.far=40;
key.shadow.camera.left=-12;key.shadow.camera.right=12;
key.shadow.camera.top=12;key.shadow.camera.bottom=-12;
scene.add(key);
const rimL=new THREE.PointLight('#a78bfa',6,14);rimL.position.set(-4,2,-4);scene.add(rimL);
const rimR=new THREE.PointLight('#34d399',4,10);rimR.position.set(5,1,5);scene.add(rimR);

// Floor
const floorGeo=new THREE.PlaneGeometry(40,40);
const floor=new THREE.Mesh(floorGeo,new THREE.MeshStandardMaterial({color:'#060610',roughness:.85,metalness:.2}));
floor.rotation.x=-Math.PI/2;floor.position.y=-4.5;floor.receiveShadow=true;scene.add(floor);
const gridH=new THREE.PolarGridHelper(16,40,30,80,'#111128','#111128');
gridH.position.y=-4.49;scene.add(gridH);

// === PC TOWER ===
const pc=new THREE.Group();
const caseMat=new THREE.MeshStandardMaterial({color:'#1c1c28',roughness:.25,metalness:.85});
const glassMat=new THREE.MeshPhysicalMaterial({color:'#0a0a14',roughness:.05,metalness:.1,transmission:.55,thickness:.3,ior:1.5,envMapIntensity:.3});
const accentMat=new THREE.MeshStandardMaterial({color:'#a78bfa',roughness:.15,metalness:.7,emissive:'#a78bfa',emissiveIntensity:.4});

// Tower body
const body=new THREE.Mesh(new THREE.BoxGeometry(2.6,4.2,4.8),caseMat);
body.position.y=2.1;body.castShadow=true;body.receiveShadow=true;pc.add(body);

// Glass front panel
const glass=new THREE.Mesh(new THREE.BoxGeometry(2.3,3.8,.06),glassMat);
glass.position.set(0,2.1,2.42);pc.add(glass);

// Top/bottom bezels on front
for(let y of[.15,4.05]){
  const b=new THREE.Mesh(new THREE.BoxGeometry(2.5,.12,.04),accentMat);
  b.position.set(0,y,2.44);pc.add(b);
}

// Accent lines on front
for(let y of[.9,2.1,3.3]){
  const l=new THREE.Mesh(new THREE.BoxGeometry(2.45,.02,.06),accentMat);
  l.position.set(0,y,2.45);pc.add(l);
}

// === INTERIOR COMPONENTS ===
const comps=new THREE.Group();

// Motherboard
const mb=new THREE.Mesh(new THREE.BoxGeometry(2.2,.04,4.2),
  new THREE.MeshStandardMaterial({color:'#0a1a0a',roughness:.4,metalness:.4}));
mb.position.set(0,.15,0);comps.add(mb);

// Circuit traces across MB
for(let i=0;i<50;i++){
  const len=.3+Math.random()*2.5;
  const tr=new THREE.Mesh(new THREE.BoxGeometry(.015,.003,len),
    new THREE.MeshStandardMaterial({color:'#34d399',roughness:.2,metalness:.6,emissive:'#34d399',emissiveIntensity:.5}));
  tr.position.set((Math.random()-.5)*2,(.15+(i%3)*.015),(Math.random()-.5)*4);
  tr.rotation.z=Math.random()<.5?0:Math.PI/2;
  comps.add(tr);
}

// CPU socket + cooler
const cpuBase=new THREE.Mesh(new THREE.CylinderGeometry(.4,.42,.08,32),
  new THREE.MeshStandardMaterial({color:'#2a2a34',roughness:.2,metalness:.9}));
cpuBase.position.set(0,.21,-.6);comps.add(cpuBase);
const cpuBody=new THREE.Mesh(new THREE.CylinderGeometry(.38,.35,.35,32),
  new THREE.MeshStandardMaterial({color:'#3a3a44',roughness:.3,metalness:.85}));
cpuBody.position.set(0,.42,-.6);cpuBody.castShadow=true;comps.add(cpuBody);
// Cooler fins
for(let i=0;i<5;i++){
  const fin=new THREE.Mesh(new THREE.BoxGeometry(.55,.015,.03),
    new THREE.MeshStandardMaterial({color:'#4a4a54',roughness:.25,metalness:.9}));
  fin.position.set(0,.6+i*.04,-.6);comps.add(fin);
}
// CPU glow ring
const cpuGlow=new THREE.Mesh(new THREE.TorusGeometry(.42,.02,16,32),
  new THREE.MeshBasicMaterial({color:'#a78bfa',transparent:true,opacity:.6}));
cpuGlow.position.set(0,.21,-.6);cpuGlow.rotation.x=Math.PI/2;comps.add(cpuGlow);

// GPU card
const gpuCard=new THREE.Group();
const gpuPCB=new THREE.Mesh(new THREE.BoxGeometry(.12,.4,2.2),
  new THREE.MeshStandardMaterial({color:'#0a1a0a',roughness:.35,metalness:.4}));
gpuPCB.position.set(1,.7,.3);gpuCard.add(gpuPCB);
const gpuBody=new THREE.Mesh(new THREE.BoxGeometry(.28,.35,2),
  new THREE.MeshStandardMaterial({color:'#222230',roughness:.25,metalness:.75}));
gpuBody.position.set(1.18,.85,.3);gpuCard.add(gpuBody);
// GPU fans
for(let z of[-.5,0,.5]){
  const fanHousing=new THREE.Mesh(new THREE.CylinderGeometry(.13,.13,.04,16),
    new THREE.MeshStandardMaterial({color:'#1a1a24',roughness:.2,metalness:.85}));
  fanHousing.rotation.x=Math.PI/2;fanHousing.position.set(1.32,.85,.3+z);gpuCard.add(fanHousing);
  for(let a=0;a<7;a++){
    const blade=new THREE.Mesh(new THREE.BoxGeometry(.02,.1,.005),
      new THREE.MeshStandardMaterial({color:'#333',roughness:.3,metalness:.7}));
    blade.position.set(1.32,.85,.3+z);
    blade.rotation.set(0,a*Math.PI*2/7,Math.PI/2);gpuCard.add(blade);
  }
}
// GPU RGB strip
const gpuRGB=new THREE.Mesh(new THREE.BoxGeometry(.25,.012,1.95),
  new THREE.MeshBasicMaterial({color:'#34d399',transparent:true,opacity:.6}));
gpuRGB.position.set(1.35,1,.3);gpuCard.add(gpuRGB);
comps.add(gpuCard);

// RAM sticks (4)
for(let z of[-1.1,-.35,.35,1.1]){
  const stick=new THREE.Mesh(new THREE.BoxGeometry(.06,.8,.1),
    new THREE.MeshStandardMaterial({color:'#0a0a18',roughness:.25,metalness:.8}));
  stick.position.set(-1,.5,z);comps.add(stick);
  const rgb=new THREE.Mesh(new THREE.BoxGeometry(.04,.02,.08),
    new THREE.MeshBasicMaterial({color:'#a78bfa',transparent:true,opacity:.7}));
  rgb.position.set(-.98,.9,z);comps.add(rgb);
  // Heat spreader
  const hs=new THREE.Mesh(new THREE.BoxGeometry(.04,.7,.07),
    new THREE.MeshStandardMaterial({color:'#2a2a34',roughness:.2,metalness:.9}));
  hs.position.set(-1,.45,z);comps.add(hs);
}

// NVMe SSD
const ssd=new THREE.Mesh(new THREE.BoxGeometry(.4,.05,.7),
  new THREE.MeshStandardMaterial({color:'#1a1a28',roughness:.25,metalness:.75}));
ssd.position.set(-.7,.2,1.8);comps.add(ssd);
const ssdRGB=new THREE.Mesh(new THREE.BoxGeometry(.35,.01,.6),
  new THREE.MeshBasicMaterial({color:'#34d399',transparent:true,opacity:.4}));
ssdRGB.position.set(-.7,.24,1.8);comps.add(ssdRGB);

pc.add(comps);

// === DATA PARTICLES inside ===
const pGeo=new THREE.BufferGeometry();
const pCount=600;
const pPos=new Float32Array(pCount*3);
const pCol=new Float32Array(pCount*3);
for(let i=0;i<pCount;i++){
  const angle=Math.random()*Math.PI*2;
  const r=1+Math.random()*2.5;
  pPos[i*3]=Math.cos(angle)*r;
  pPos[i*3+1]=Math.random()*4;
  pPos[i*3+2]=(Math.random()-.5)*4.5;
  const t=Math.random();
  pCol[i*3]=.65+t*.35;pCol[i*3+1]=.5-t*.3;pCol[i*3+2]=1;
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
const pMat=new THREE.PointsMaterial({size:.025,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.7});
const particles=new THREE.Points(pGeo,pMat);
pc.add(particles);

scene.add(pc);

// Ring around tower
const ring=new THREE.Mesh(new THREE.TorusGeometry(3.4,.015,16,140),
  new THREE.MeshBasicMaterial({color:'#a78bfa',transparent:true,opacity:.12}));
ring.position.y=2.1;ring.rotation.x=Math.PI/2.3;scene.add(ring);

const ring2=new THREE.Mesh(new THREE.TorusGeometry(3.7,.012,16,160),
  new THREE.MeshBasicMaterial({color:'#34d399',transparent:true,opacity:.08}));
ring2.position.y=2.1;ring2.rotation.x=-Math.PI/2.5;scene.add(ring2);

// Ambient floating dots
const dotsGeo=new THREE.BufferGeometry();
const dCount=300;
const dPos=new Float32Array(dCount*3);
for(let i=0;i<dCount;i++){
  dPos[i*3]=(Math.random()-.5)*20;
  dPos[i*3+1]=Math.random()*10-1;
  dPos[i*3+2]=(Math.random()-.5)*16;
}
dotsGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));
const dots=new THREE.Points(dotsGeo,
  new THREE.PointsMaterial({size:.03,color:'#a78bfa',blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:.4}));
scene.add(dots);

// Animation
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  controls.update();
  ring.rotation.z+=.002;ring.rotation.x+=.001;
  ring2.rotation.z-=.0015;ring2.rotation.x-=.001;
  particles.rotation.y+=.003;
  particles.rotation.x+=.001;
  dots.rotation.y+=.0005;
  cpuGlow.rotation.z+=.02;
  cpuGlow.material.opacity=.4+Math.sin(t*2.5)*.2;
  gpuRGB.material.opacity=.5+Math.sin(t*3)*.2;
  rimL.intensity=5.5+Math.sin(t*1.5)*.8;
  composer.render();
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
