<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>bmops.tech</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030308;overflow:hidden;height:100vh;width:100vw}
canvas{position:fixed;top:0;left:0}
.loader{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:#030308;transition:opacity .6s;flex-direction:column}
.loader.hidden{opacity:0;pointer-events:none}
.loader .ring{width:40px;height:40px;border:2px solid #1a1a2e;border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite}
.loader p{color:#52525b;font-size:12px;margin-top:12px;font-family:system-ui,sans-serif}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ring"></div><p>Loading 3D...</p></div>
<canvas id="c"></canvas>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {DRACOLoader} from 'three/addons/loaders/DRACOLoader.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#030308');
scene.fog=new THREE.Fog('#030308',6,25);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.5,50);
camera.position.set(4,3,8);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.08;
controls.target.set(0,1.5,0);
controls.minDistance=2;controls.maxDistance=12;
controls.maxPolarAngle=Math.PI*.6;
controls.autoRotate=true;controls.autoRotateSpeed=.5;
controls.update();

scene.add(new THREE.AmbientLight('#1a1a3e',.7));
const key=new THREE.DirectionalLight('#ffffff',2.5);key.position.set(8,12,6);scene.add(key);
const rim1=new THREE.PointLight('#a78bfa',5,12);rim1.position.set(-4,3,-3);scene.add(rim1);
const rim2=new THREE.PointLight('#34d399',3,10);rim2.position.set(5,2,4);scene.add(rim2);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(30,30),
  new THREE.MeshStandardMaterial({color:'#060610',roughness:.85,metalness:.2}));
floor.rotation.x=-Math.PI/2;floor.position.y=-3;floor.receiveShadow=true;scene.add(floor);

const loader=new GLTFLoader();
const draco=new DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
loader.setDRACOLoader(draco);

loader.load('model.glb',gltf=>{
  const model=gltf.scene;
  const box=new THREE.Box3().setFromObject(model);
  const size=box.getSize(new THREE.Vector3());
  const center=box.getCenter(new THREE.Vector3());
  const scale=6/Math.max(size.x,size.y,size.z);
  model.scale.setScalar(scale);
  model.position.set(-center.x*scale,-center.y*scale+2.5,-center.z*scale);
  model.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true}});
  scene.add(model);
  document.getElementById('loader').classList.add('hidden');
},p=>{
  document.getElementById('loader').innerHTML=`<div class="ring"></div><p>${Math.round(p.loaded/p.total*100)}%</p>`;
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
